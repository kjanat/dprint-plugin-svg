[env]
CFLAGS_wasm32_unknown_unknown = "-DNDEBUG -Wno-error=incompatible-pointer-types -Disalpha(c)=(((c)>=65&&(c)<=90)||((c)>=97&&(c)<=122)) -Disdigit(c)=((c)>=48&&(c)<=57)"

[target.wasm32-unknown-unknown]
rustflags = ["-Clink-args=-z stack-size=10485760"]

[alias]
# Nightly-only rustdoc audit: enables `rustdoc::missing_doc_code_examples`
# so missing `# Examples` blocks on public items show up as warnings (then
# denied via `-D warnings`). Run with:
#
#     rustup run nightly -- cargo doc-nightly --all-features --no-deps
#
# Layered config in `.cargo/nightly.toml` carries the unstable `-Zcrate-attr`
# rustdoc flags, so the regular `cargo doc` stays stable-toolchain clean.
doc-nightly = ["--config", ".cargo/nightly.toml", "doc"]

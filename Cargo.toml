[package]
name        = "dprint-plugin-svg"
version     = "0.1.0"
edition     = "2024"
description = "dprint Wasm plugin for SVG formatting"
readme      = "README.md"
repository  = "https://github.com/kjanat/dprint-plugin-svg"
license     = "MIT"
keywords    = ["dprint", "formatter", "svg", "wasm"]
categories  = ["development-tools", "text-editors"]

[lib]
crate-type = ["cdylib", "lib"]

[[bin]]
name              = "generate-schema"
required-features = ["schema"]

[dependencies]
anyhow      = "1"
dprint-core = { version = "0.67", features = ["wasm"] }
schemars    = { version = "0.8", optional = true }
serde       = { version = "1", features = ["derive"] }
serde_json  = { version = "1", features = ["preserve_order"] }
svg-format  = { package = "svg-format", path = "../svg-language-server/crates/svg-format" }

[features]
default = []
schema  = ["dep:schemars"]

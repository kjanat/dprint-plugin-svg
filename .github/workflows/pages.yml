name: Pages
on:
  push: { branches: [master] }
  workflow_dispatch:
permissions:
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@mdbook
      - uses: dtolnay/rust-toolchain@stable
      - name: Regenerate config pages from rustdoc + schema
        # The config pages + `_generated/` fragments are authoritative-
        # generated by `generate-docs`. Regen on every deploy so the
        # published site always reflects the current commit's rustdoc
        # and `FormatOptions::default()` — no "forgot to run
        # `just book-docs` before committing" drift.
        run: cargo run --features docs --bin generate-docs
      - name: Inject plugin version into docs
        # Source of truth is `Cargo.toml` — not `git describe` — so the
        # published quick-start URL always matches the crate version
        # currently being deployed, regardless of whether the release
        # tag has been pushed yet.
        run: |
          TAG="v$(yq -p toml '.package.version' Cargo.toml)"
          find docs/src -name '*.md' -exec sed -i "s/{{LATEST_TAG}}/$TAG/g" {} +
      - run: mdbook build docs
      - uses: actions/upload-pages-artifact@v4
        with: { path: docs/book }
      - id: deploy
        uses: actions/deploy-pages@v5

name: Pages
on:
  push: { branches: [master] }
  workflow_dispatch:
permissions:
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with: { tool: mdbook,just }
      # `just book` runs `generate-docs` (which bakes the current
      # `CARGO_PKG_VERSION` into the quick-start + regenerates every
      # config page from rustdoc) and then `mdbook build docs`. Same
      # recipe devs use locally, so CI can't drift from local output.
      - run: just book
      - uses: actions/upload-pages-artifact@v5
        with: { path: docs/book }
      - id: deploy
        uses: actions/deploy-pages@v5

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-unknown-unknown }

      - name: Run tests
        run: cargo test --all-targets --all-features

      - name: Build Wasm artifact
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Generate schema and normalize release artifact names
        run: |
          cargo run --features schema --bin generate-schema -- deployment/schema.json
          cp target/wasm32-unknown-unknown/release/dprint_plugin_svg.wasm target/wasm32-unknown-unknown/release/plugin.wasm

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with: { files: "target/wasm32-unknown-unknown/release/plugin.wasm\ndeployment/schema.json" }

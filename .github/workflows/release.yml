name: Release
on: { push: { tags: ["v*"] } }
permissions: { contents: write }

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: taiki-e/install-action@just
      - uses: kjanat/install-dprint@v1
      - uses: tombi-toml/setup-tombi@v1

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-unknown-unknown }

      - name: Build Wasm artifact
        run: just build-wasm

      - name: Run tests
        run: just test

      - name: Generate schema
        run: just schema

      - name: Normalize release artifact names
        working-directory: target/wasm32-unknown-unknown/release
        run: mv dprint_plugin_svg.wasm plugin.wasm

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/wasm32-unknown-unknown/release/plugin.wasm
            deployment/schema.json

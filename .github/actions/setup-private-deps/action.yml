name: setup-private-deps
description: Configure SSH and Cargo for private git dependencies.

inputs:
  ssh-private-key:
    description: SSH private key for checking out private dependency repositories.
    required: true

runs:
  using: composite
  steps:
    - name: Configure SSH key for GitHub
      shell: bash
      run: |
        mkdir -p "$HOME/.ssh"
        chmod 700 "$HOME/.ssh"

        key_path="$HOME/.ssh/svg_sls_ci"
        printf '%s\n' "${{ inputs.ssh-private-key }}" > "$key_path"
        chmod 600 "$key_path"

        ssh-keyscan github.com >> "$HOME/.ssh/known_hosts"

        cat > "$HOME/.ssh/config" <<EOF
        Host github.com
          IdentityFile $key_path
          IdentitiesOnly yes
        EOF
        chmod 600 "$HOME/.ssh/config"

    - name: Clone svg-language-server
      shell: bash
      run: |
        git clone --depth 1 git@github.com:kjanat/svg-language-server.git \
          "$GITHUB_WORKSPACE/../svg-language-server"
